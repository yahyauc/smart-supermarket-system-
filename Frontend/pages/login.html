<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Smart Supermarket</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card fade-up">
        <div class="auth-logo">
            <div class="brand-icon">🛒</div>
            <h2>Welcome back</h2>
            <p>Sign in to your account</p>
        </div>

        <div id="error-box"></div>

        <div class="form-group">
            <label class="form-label">Username or Email</label>
            <input type="text" id="identifier" class="form-control" placeholder="Enter username or email" autofocus>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password">
        </div>

        <button id="login-btn" class="btn btn-primary w-full btn-lg" onclick="handleLogin()">
            Sign In
        </button>

        <div class="auth-switch">
            Don't have an account? <a href="./register.html">Create one</a>
        </div>

        <div class="auth-switch" style="margin-top:10px">
            <a href="../index.html" style="color:var(--muted)">← Back to Home</a>
        </div>
    </div>
</div>

<script type="module">
    import { login, setUser, getUser } from '../js/api.js';

    // Already logged in?
    if (getUser()) window.location.href = '../index.html';

    window.handleLogin = async function () {
        const identifier = document.getElementById("identifier").value.trim();
        const password   = document.getElementById("password").value;
        const btn        = document.getElementById("login-btn");
        const errorBox   = document.getElementById("error-box");

        errorBox.innerHTML = "";

        if (!identifier || !password) {
            errorBox.innerHTML = `<div class="alert alert-error">All fields are required.</div>`;
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span> Signing in...`;

        const res = await login(identifier, password);

        if (res.error) {
            errorBox.innerHTML = `<div class="alert alert-error">❌ ${res.error}</div>`;
            btn.disabled = false;
            btn.textContent = "Sign In";
            return;
        }

        setUser(res.user);

        if (res.user.role === "admin") {
            window.location.href = "./admin-dashboard.html";
        } else {
            window.location.href = "./products.html";
        }
    };

    document.addEventListener("keydown", e => {
        if (e.key === "Enter") window.handleLogin();
    });
</script>
</body>
</html>

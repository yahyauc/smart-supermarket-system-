<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Smart Supermarket</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card fade-up">
        <div class="auth-logo">
            <div class="brand-icon">🛒</div>
            <h2>Create account</h2>
            <p>Join Smart Supermarket today</p>
        </div>

        <div id="error-box"></div>

        <div class="form-group">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Choose a username" autofocus>
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label class="form-label">Password <span style="color:var(--muted);font-weight:400">(min. 6 characters)</span></label>
            <input type="password" id="password" class="form-control" placeholder="Create a password">
        </div>

        <button id="reg-btn" class="btn btn-primary w-full btn-lg" onclick="handleRegister()">
            Create Account
        </button>

        <div class="auth-switch">
            Already have an account? <a href="./login.html">Sign in</a>
        </div>
    </div>
</div>

<script type="module">
    import { register, setUser } from '../js/api.js';

    window.handleRegister = async function () {
        const username = document.getElementById("username").value.trim();
        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn      = document.getElementById("reg-btn");
        const errorBox = document.getElementById("error-box");

        errorBox.innerHTML = "";

        if (!username || !email || !password) {
            errorBox.innerHTML = `<div class="alert alert-error">All fields are required.</div>`;
            return;
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span> Creating account...`;

        const res = await register(username, email, password);

        if (res.error) {
            errorBox.innerHTML = `<div class="alert alert-error">❌ ${res.error}</div>`;
            btn.disabled = false;
            btn.textContent = "Create Account";
            return;
        }

        setUser(res.user);
        window.location.href = "./products.html";
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart — Smart Supermarket</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav id="navbar"></nav>

<div style="max-width:960px;margin:0 auto;padding:32px 24px">

    <div class="page-header">
        <h1>🛒 Your Cart</h1>
        <p>Review your items before placing the order</p>
    </div>

    <div id="cart-content"></div>
</div>

<div class="toast-container" id="toast-container"></div>

<script type="module">
    import { createOrder, getUser } from '../js/api.js';
    import {
        getCart, removeFromCart, updateQty, clearCart,
        getCartTotal, buildNavbar, toast, formatPrice, categoryEmoji
    } from '../js/app.js';

    buildNavbar('cart');

    function render() {
        const cart      = getCart();
        const container = document.getElementById("cart-content");

        if (!cart.length) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🛒</div>
                    <h3>Your cart is empty</h3>
                    <p>Add some products to get started</p>
                    <a href="./products.html" class="btn btn-primary mt-16">Browse Products</a>
                </div>`;
            return;
        }

        container.innerHTML = `
            <div style="display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start">

                <!-- Items -->
                <div class="card" style="padding:0;overflow:hidden">
                    <div style="padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
                        <h3>Items (${cart.reduce((s,i) => s + i.quantity, 0)})</h3>
                        <button class="btn btn-outline btn-sm" onclick="handleClear()">🗑 Clear all</button>
                    </div>
                    <div id="items-list"></div>
                </div>

                <!-- Summary -->
                <div>
                    <div class="card" style="margin-bottom:16px">
                        <h3 style="margin-bottom:16px">Order Summary</h3>
                        <div id="summary-rows"></div>
                        <div style="border-top:2px solid var(--border);margin:14px 0;padding-top:14px;display:flex;justify-content:space-between;align-items:center">
                            <span style="font-size:15px;font-weight:700">Total</span>
                            <span style="font-size:20px;font-weight:800;color:var(--primary)" id="total-display"></span>
                        </div>
                        <div class="form-group" style="margin-bottom:12px">
                            <label class="form-label">Note (optional)</label>
                            <textarea id="order-note" class="form-control" rows="2" placeholder="Special instructions..."></textarea>
                        </div>
                        <button class="btn btn-primary w-full btn-lg" id="place-btn" onclick="handlePlaceOrder()">
                            Place Order →
                        </button>
                    </div>
                    <a href="./products.html" class="btn btn-outline w-full" style="justify-content:center">
                        ← Continue Shopping
                    </a>
                </div>
            </div>`;

        renderItems();
        renderSummary();
    }

    function renderItems() {
        const cart = getCart();
        const list = document.getElementById("items-list");
        if (!list) return;

        list.innerHTML = cart.map(item => `
            <div style="display:flex;align-items:center;gap:16px;padding:16px 22px;border-bottom:1px solid var(--border)">
                <div style="width:48px;height:48px;background:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">
                    📦
                </div>
                <div style="flex:1;min-width:0">
                    <div style="font-weight:600;font-size:14px;color:var(--text)">${item.product_name}</div>
                    <div style="font-size:13px;color:var(--muted)">${formatPrice(item.price)} each</div>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                    <button class="btn btn-outline btn-sm" style="padding:5px 10px"
                        onclick="changeQty(${item.product_id}, ${item.quantity - 1})">−</button>
                    <span style="font-weight:700;min-width:24px;text-align:center">${item.quantity}</span>
                    <button class="btn btn-outline btn-sm" style="padding:5px 10px"
                        onclick="changeQty(${item.product_id}, ${item.quantity + 1})">+</button>
                </div>
                <div style="font-weight:700;color:var(--primary);min-width:80px;text-align:right">
                    ${formatPrice(item.price * item.quantity)}
                </div>
                <button class="btn btn-ghost btn-sm" style="color:var(--red)"
                    onclick="handleRemove(${item.product_id})">✕</button>
            </div>
        `).join("");
    }

    function renderSummary() {
        const cart  = getCart();
        const rows  = document.getElementById("summary-rows");
        const total = document.getElementById("total-display");
        if (!rows) return;

        rows.innerHTML = cart.map(i => `
            <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--text-2);margin-bottom:8px">
                <span>${i.product_name} × ${i.quantity}</span>
                <span>${formatPrice(i.price * i.quantity)}</span>
            </div>
        `).join("");

        if (total) total.textContent = formatPrice(getCartTotal());
    }

    window.changeQty = function(productId, qty) {
        if (qty < 1) { handleRemove(productId); return; }
        updateQty(productId, qty);
        render();
    };

    window.handleRemove = function(productId) {
        removeFromCart(productId);
        toast("Item removed", "warning");
        render();
    };

    window.handleClear = function() {
        if (!confirm("Clear all items from cart?")) return;
        clearCart();
        render();
    };

    window.handlePlaceOrder = async function() {
        const user = getUser();
        if (!user) {
            toast("Please login to place an order", "error");
            setTimeout(() => window.location.href = "./login.html", 1500);
            return;
        }

        const cart = getCart();
        if (!cart.length) return;

        const note = document.getElementById("order-note")?.value || "";
        const btn  = document.getElementById("place-btn");

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span> Placing order...`;

        const items = cart.map(i => ({ product_id: i.product_id, quantity: i.quantity }));
        const res   = await createOrder(user.id, items, note);

        if (res.error) {
            toast(res.error, "error");
            btn.disabled = false;
            btn.textContent = "Place Order →";
            return;
        }

        clearCart();
        toast("Order placed successfully! 🎉", "success");
        setTimeout(() => window.location.href = "./orders.html", 1500);
    };

    render();
</script>
</body>
</html>
